<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>VPN Host</title>
  <style>
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; margin: 0; padding: 18px; background:#f8f9fa; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    label { display:block; font-weight:600; margin-bottom:4px; }
    input[type=text] { width:100%; padding:8px; box-sizing:border-box; font-size:14px; border:1px solid #ccc; border-radius:4px; }
    button { margin-top:14px; padding:8px 16px; font-size:14px; background:#0069d9; color:#fff; border:none; border-radius:4px; cursor:pointer; }
    button:hover { background:#0053b3; }
  </style>
</head>
<body>
  <h2>Connect to VPN</h2>
  <form id="hostForm">
    <label for="host">VPN Host</label>
    <input id="host" name="host" type="text" placeholder="example.vpn.com" autofocus required />
    <button type="submit">Connect</button>
  </form>
  <script>
    const { ipcRenderer } = require('electron');
    document.getElementById('hostForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const hostInput = document.getElementById('host');
      const host = hostInput.value.trim();
      if (!host) { return; }
      ipcRenderer.send('host-submitted', host);
      hostInput.disabled = true;
    });
  </script>
</body>
</html>
